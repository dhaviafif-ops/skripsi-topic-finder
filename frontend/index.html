<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>AI Skripsi Topic Finder</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="container">

    <h1>🤖 AI Skripsi Topic Finder</h1>

    <p class="subtitle">
      Temukan ide skripsi terbaik menggunakan AI
    </p>

    <div class="input-group">

      <input
        type="text"
        id="jurusan"
        placeholder="Masukkan Jurusan"
      />

      <input
        type="text"
        id="minat"
        placeholder="Masukkan Minat Penelitian"
      />

      <button onclick="generateTopic()">
        Generate Topic
      </button>

    </div>

    <div class="result-box">

      <h2>📘 Hasil AI</h2>

      <div id="result"></div>

    </div>

  </div>

  <script src="./script.js"></script>

</body>

</html>
