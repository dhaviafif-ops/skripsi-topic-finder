<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Research Assistant</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Background Glow -->
    <div class="blur blur1"></div>
    <div class="blur blur2"></div>

    <div class="app">

        <!-- Header -->
        <div class="header">

            <div class="badge">
                🚀 Powered by AI
            </div>

            <h1>🎓 AI Research Assistant</h1>

            <p class="subtitle">
                Temukan Ide Skripsi Berkualitas dengan Bantuan Artificial Intelligence
            </p>

            <!-- Statistik -->
            <div class="stats">

                <div class="stat">
                    <h3>100+</h3>
                    <p>Topik AI</p>
                </div>

                <div class="stat">
                    <h3>24/7</h3>
                    <p>AI Assistant</p>
                </div>

                <div class="stat">
                    <h3>10+</h3>
                    <p>Metode Penelitian</p>
                </div>

            </div>

        </div>

        <!-- Form Input -->
        <div class="search-box">

            <input
                type="text"
                id="jurusan"
                placeholder="📚 Masukkan Jurusan">

            <input
                type="text"
                id="minat"
                placeholder="🔍 Masukkan Minat Penelitian">

            <button onclick="generateTopic()">
                🚀 Generate Topic
            </button>

        </div>

        <!-- Loading -->
        <div id="loading" class="loading">

            <div class="loader"></div>

            AI sedang menganalisis topik penelitian...

        </div>

        <!-- Hasil AI -->
        <div class="chat-container">

            <div class="chat-header">
                ✨ Hasil Analisis AI
            </div>

            <div id="result">

                <p style="color:#94a3b8">
                    Hasil rekomendasi topik skripsi akan muncul di sini...
                </p>

            </div>

        </div>

        <!-- Tombol Copy -->
        <button
            id="copyBtn"
            class="copy-btn"
            onclick="copyResult()">

            📋 Copy Hasil

        </button>

    </div>

    <script src="script.js"></script>

</body>

</html>
